<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA Emulator - Pokémon Fire Red</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 10px; font-size: 1.5rem; }
        #emulator-container {
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
            image-rendering: pixelated; /* Keeps pixels sharp */
        }
        .controls {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
            text-align: center;
            line-height: 1.4;
        }
    </style>
    <!-- Import the GBA.js emulator engine engine via public CDN -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <h1>Pokémon Fire Red</h1>
    
    <div id="emulator-container">
        <!-- GBA native resolution is 240x160. Scale up for visibility -->
        <canvas id="screen" width="480" height="320"></canvas>
    </div>

    <div class="controls">
        <strong>Controls:</strong> <br>
        D-Pad: Arrow Keys | A: Z | B: X | L: A | R: S <br>
        Start: Enter | Select: Shift
    </div>

    <script>
        window.onload = function() {
            var gba;
            try {
                // Initialize engine bound to our canvas
                gba = new GameBoyAdvance();
                gba.setCanvas(document.getElementById('screen'));
                gba.logLevel = gba.LOG_ERROR;

                // Load the ROM file asynchronously from the repository root
                gba.loadRomFromFile('firered.gba', function(err) {
                    if (err) {
                        console.error("Failed to load ROM:", err);
                        alert("Could not load game file.");
                    } else {
                        // Start emulation loop once file is ready
                        gba.run();
                    }
                });
            } catch (exception) {
                console.error("Emulator crashed during boot:", exception);
            }
        };
    </script>

</body>
</html>
